name: Verify Contracts

on:
  schedule:
    - cron: '*/10 * * * *'
    #- cron: '0 0 * * *'
  workflow_dispatch:

permissions: {}

defaults:
  run:
    # GHA's implicit default is `bash -e` (no pipefail); explicitly setting
    # `bash` upgrades it to `bash -eo pipefail` so command failures inside
    # `cmd | tee ...` pipelines aren't silently masked by tee.
    shell: bash

env:
  WASMS_REPO: stellar-experimental/contract-wasms

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      has_work: ${{ steps.build.outputs.has_work }}
    steps:
      - uses: actions/checkout@v5
      - name: Clone wasms repo
        run: git clone --depth 1 "https://github.com/${WASMS_REPO}" /tmp/wasms
      - name: Build matrix of unverified wasms
        id: build
        run: |
          set -euo pipefail
          items='[]'
          shopt -s nullglob
          for f in /tmp/wasms/contracts/*.wasm; do
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            if [ -f "verifications/${hash}.json" ] || [ -f "verifications-failed/${hash}.json" ]; then
              continue
            fi
            rel=${f#/tmp/wasms/}
            items=$(jq -c --arg h "$hash" --arg p "$rel" '. + [{hash: $h, file: $p}]' <<<"$items")
          done
          # GitHub Actions caps matrix expansion at 256 jobs per run.
          items=$(jq -c '.[0:256]' <<<"$items")
          count=$(jq 'length' <<<"$items")
          echo "Discovered $count wasms to verify"
          echo "matrix=$items" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "has_work=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_work=false" >> "$GITHUB_OUTPUT"
          fi

  verify:
    needs: discover
    if: needs.discover.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - name: Download wasm
        env:
          FILE: ${{ matrix.item.file }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/wasm
          curl -fsSL \
            "https://raw.githubusercontent.com/${WASMS_REPO}/main/${FILE}" \
            -o /tmp/wasm/contract.wasm

      # Install a baseline stellar-cli (latest release prebuilt) just so we can
      # read the wasm's meta. The cliver-matched binary installed below shadows
      # this one on PATH for the actual verify step.
      - name: Install baseline stellar-cli
        run: curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh

      - name: Read wasm meta
        id: meta
        run: |
          set -euo pipefail
          # `--output json` returns: [{"sc_meta_v0": {"key": "...", "val": "..."}}, ...]
          # Normalize to a flat object: {"key": "val", ...}
          raw=$(stellar contract info meta --wasm /tmp/wasm/contract.wasm --output json) || raw='[]'
          meta_json=$(jq -c 'map({(.sc_meta_v0.key): .sc_meta_v0.val}) | add // {}' <<<"$raw")
          source_repo=$(jq -r '.source_repo // ""' <<<"$meta_json")
          source_rev=$(jq -r '.source_rev // ""' <<<"$meta_json")
          # cliver format: "<pkg-version>#<git-describe-or-sha>". Extract the
          # SHA after the last "-g" (git-describe form) or the suffix as-is.
          cliver=$(jq -r '.cliver // ""' <<<"$meta_json")
          ref=${cliver#*#}
          case "$ref" in
            *-g*) ref=${ref##*-g} ;;
          esac
          {
            echo "meta_json<<META_EOF"
            echo "$meta_json"
            echo "META_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "source_repo=$source_repo" >> "$GITHUB_OUTPUT"
          echo "source_rev=$source_rev" >> "$GITHUB_OUTPUT"
          echo "cliver_ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Cache stellar-cli matching cliver
        if: steps.meta.outputs.cliver_ref != ''
        id: cache-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/stellar
          key: stellar-cli-cliver-${{ steps.meta.outputs.cliver_ref }}

      - name: Install stellar-cli matching cliver
        if: steps.meta.outputs.cliver_ref != '' && steps.cache-cli.outputs.cache-hit != 'true'
        env:
          CLIVER_REF: ${{ steps.meta.outputs.cliver_ref }}
        run: |
          # Deps mirror stellar-cli's install.sh `--install-deps` apt list.
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev libudev-dev pkg-config libssl-dev build-essential
          # Full clone (vs. `cargo install --git --rev`) so the local repo has
          # tags. crate-git-revision's `git describe` consults tags to produce
          # the cliver suffix; without them the embedded version is just the
          # bare SHA and won't match the wasm's recorded cliver.
          git clone https://github.com/stellar/stellar-cli /tmp/stellar-cli-src
          git -C /tmp/stellar-cli-src checkout "$CLIVER_REF"
          cargo install --locked --path /tmp/stellar-cli-src/cmd/stellar-cli

      - name: Clone source
        id: clone
        if: steps.meta.outputs.source_repo != '' && steps.meta.outputs.source_rev != ''
        continue-on-error: true
        env:
          REPO: ${{ steps.meta.outputs.source_repo }}
          REV: ${{ steps.meta.outputs.source_rev }}
        run: |
          ( git clone "$REPO" /tmp/source && git -C /tmp/source checkout "$REV" ) 2>&1 | tee /tmp/clone.log

      - name: Run build verify
        id: verify
        if: steps.clone.outcome == 'success'
        continue-on-error: true
        working-directory: /tmp/source
        run: |
          stellar contract build verify \
            --wasm /tmp/wasm/contract.wasm \
            2>&1 | tee /tmp/verify.log

      - name: Build verification record
        env:
          HASH: ${{ matrix.item.hash }}
          META_JSON: ${{ steps.meta.outputs.meta_json }}
          SOURCE_REPO: ${{ steps.meta.outputs.source_repo }}
          SOURCE_REV: ${{ steps.meta.outputs.source_rev }}
          CLONE_OUTCOME: ${{ steps.clone.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          strip_ansi() { sed -E 's/\x1B\[[0-9;]*[a-zA-Z]//g'; }
          if [ "$VERIFY_OUTCOME" = "success" ]; then
            verified=true
            err_text=""
          elif [ "$VERIFY_OUTCOME" = "failure" ]; then
            verified=false
            err_text=$(strip_ansi < /tmp/verify.log)
          elif [ "$CLONE_OUTCOME" = "failure" ]; then
            verified=false
            err_text=$(strip_ansi < /tmp/clone.log)
          elif [ -z "$SOURCE_REPO" ] && [ -z "$SOURCE_REV" ]; then
            verified=false
            err_text="wasm meta missing source_repo and source_rev"
          elif [ -z "$SOURCE_REPO" ]; then
            verified=false
            err_text="wasm meta missing source_repo"
          else
            verified=false
            err_text="wasm meta missing source_rev"
          fi
          printf '%s' "$err_text" > /tmp/err.txt
          jq -n \
            --arg hash "$HASH" \
            --argjson verified "$verified" \
            --arg run "$RUN_URL" \
            --rawfile err /tmp/err.txt \
            --argjson meta "$META_JSON" \
            '{"wasm-hash": $hash, "build-verified": $verified, "error": (if $verified then null else $err end), "run": $run, "meta": $meta}' \
            > "${HASH}.json"
          cat "${HASH}.json"

      - name: Upload verification record
        uses: actions/upload-artifact@v4
        with:
          name: verification-${{ matrix.item.hash }}
          path: ${{ matrix.item.hash }}.json
          if-no-files-found: error

  commit:
    needs: [discover, verify]
    if: ${{ !cancelled() && needs.discover.outputs.has_work == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Download verification artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: verification-*
          path: /tmp/artifacts
          merge-multiple: true
      - name: Sort records into verifications/ and verifications-failed/
        run: |
          set -euo pipefail
          mkdir -p verifications verifications-failed
          shopt -s nullglob
          for f in /tmp/artifacts/*.json; do
            if [ "$(jq -r '.["build-verified"]' "$f")" = "true" ]; then
              cp "$f" "verifications/$(basename "$f")"
            else
              cp "$f" "verifications-failed/$(basename "$f")"
            fi
          done
      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add verifications/ verifications-failed/
          if git diff --cached --quiet; then
            echo "No new verification records to commit"
            exit 0
          fi
          git commit -m "Add verification records"
          git push
